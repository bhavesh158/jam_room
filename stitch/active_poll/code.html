<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>JamRoom - Active Poll</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#8c25f4",
                        "background-light": "#f7f5f8",
                        "background-dark": "#191022",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Space Grotesk', sans-serif;
        }
        .radio-custom:checked + div {
            border-color: #8c25f4;
            background-color: rgba(140, 37, 244, 0.05);
        }
        .radio-custom:checked + div .radio-dot {
            background-color: #8c25f4;
            border-color: #8c25f4;
        }
        .radio-custom:checked + div .radio-dot::after {
            content: '';
            display: block;
            width: 8px;
            height: 8px;
            background-color: white;
            border-radius: 50%;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<header class="flex items-center justify-between p-4 bg-white/80 dark:bg-background-dark/80 backdrop-blur-md sticky top-0 z-10 border-b border-primary/10">
<button class="p-2 hover:bg-primary/10 rounded-full transition-colors text-slate-600 dark:text-slate-400">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<div class="flex flex-col items-center">
<h1 class="text-lg font-bold tracking-tight text-primary">JamRoom Poll</h1>
<div class="flex items-center gap-1.5">
<span class="size-2 rounded-full bg-emerald-500 animate-pulse"></span>
<p class="text-[10px] uppercase tracking-widest font-bold text-slate-500 dark:text-slate-400">Live Session</p>
</div>
</div>
<button class="p-2 hover:bg-primary/10 rounded-full transition-colors text-slate-600 dark:text-slate-400">
<span class="material-symbols-outlined">more_vert</span>
</button>
</header>
<main class="flex-1 flex flex-col px-6 py-8 max-w-md mx-auto w-full">
<div class="mb-8 text-center">
<div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-primary/10 text-primary mb-4">
<span class="material-symbols-outlined text-sm">lan</span>
<span class="text-xs font-medium">Connected to 192.168.1.45</span>
</div>
<h2 class="text-2xl font-bold leading-tight dark:text-white">What should we order for the hackathon snacks?</h2>
<p class="mt-2 text-slate-500 dark:text-slate-400 text-sm">Select one option to cast your vote</p>
</div>
<div class="space-y-4 flex-1">
<label class="relative block cursor-pointer group">
<input checked="" class="sr-only radio-custom" name="poll-option" type="radio"/>
<div class="flex items-center justify-between p-5 rounded-xl border-2 border-primary/10 bg-white dark:bg-slate-900 transition-all hover:border-primary/30 active:scale-[0.98]">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-lg bg-primary/10 flex items-center justify-center text-primary">
<span class="material-symbols-outlined">restaurant</span>
</div>
<span class="text-lg font-medium">Samosas</span>
</div>
<div class="radio-dot size-6 rounded-full border-2 border-primary/20 flex items-center justify-center transition-colors"></div>
</div>
</label>
<label class="relative block cursor-pointer group">
<input class="sr-only radio-custom" name="poll-option" type="radio"/>
<div class="flex items-center justify-between p-5 rounded-xl border-2 border-primary/10 bg-white dark:bg-slate-900 transition-all hover:border-primary/30 active:scale-[0.98]">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-lg bg-primary/10 flex items-center justify-center text-primary">
<span class="material-symbols-outlined">bakery_dining</span>
</div>
<span class="text-lg font-medium">Kachoris</span>
</div>
<div class="radio-dot size-6 rounded-full border-2 border-primary/20 flex items-center justify-center transition-colors"></div>
</div>
</label>
<label class="relative block cursor-pointer group">
<input class="sr-only radio-custom" name="poll-option" type="radio"/>
<div class="flex items-center justify-between p-5 rounded-xl border-2 border-primary/10 bg-white dark:bg-slate-900 transition-all hover:border-primary/30 active:scale-[0.98]">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-lg bg-primary/10 flex items-center justify-center text-primary">
<span class="material-symbols-outlined">lunch_dining</span>
</div>
<span class="text-lg font-medium">Burgers</span>
</div>
<div class="radio-dot size-6 rounded-full border-2 border-primary/20 flex items-center justify-center transition-colors"></div>
</div>
</label>
<label class="relative block cursor-pointer group">
<input class="sr-only radio-custom" name="poll-option" type="radio"/>
<div class="flex items-center justify-between p-5 rounded-xl border-2 border-primary/10 bg-white dark:bg-slate-900 transition-all hover:border-primary/30 active:scale-[0.98]">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-lg bg-primary/10 flex items-center justify-center text-primary">
<span class="material-symbols-outlined">local_pizza</span>
</div>
<span class="text-lg font-medium">Pizza</span>
</div>
<div class="radio-dot size-6 rounded-full border-2 border-primary/20 flex items-center justify-center transition-colors"></div>
</div>
</label>
</div>
<div class="mt-10 mb-4">
<button class="w-full py-4 px-6 bg-primary text-white font-bold text-lg rounded-xl shadow-lg shadow-primary/25 hover:shadow-primary/40 active:scale-95 transition-all flex items-center justify-center gap-2">
<span>Submit Vote</span>
<span class="material-symbols-outlined">send</span>
</button>
<p class="text-center text-xs text-slate-400 mt-4">You can change your mind until the host closes the poll.</p>
</div>
</main>
<nav class="bg-white dark:bg-background-dark border-t border-primary/10 pb-6 pt-3 px-6 flex justify-around items-center">
<a class="flex flex-col items-center gap-1 text-primary" href="#">
<span class="material-symbols-outlined">how_to_vote</span>
<span class="text-[10px] font-bold uppercase tracking-wider">Vote</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">analytics</span>
<span class="text-[10px] font-bold uppercase tracking-wider">Results</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">group</span>
<span class="text-[10px] font-bold uppercase tracking-wider">Peers</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">settings</span>
<span class="text-[10px] font-bold uppercase tracking-wider">Config</span>
</a>
</nav>
</body></html>
