<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JamRoom - Local Real-Time Voting</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#8c25f4",
                        "background-light": "#f7f5f8",
                        "background-dark": "#191022",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Space Grotesk', sans-serif;
        }
        .radio-custom:checked + div {
            border-color: #8c25f4;
            background-color: rgba(140, 37, 244, 0.05);
        }
        .radio-custom:checked + div .radio-dot {
            background-color: #8c25f4;
            border-color: #8c25f4;
        }
        .radio-custom:checked + div .radio-dot::after {
            content: '';
            display: block;
            width: 8px;
            height: 8px;
            background-color: white;
            border-radius: 50%;
        }
        .nav-item.active {
            color: #8c25f4;
        }
        .option-icons {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background-color: rgba(140, 37, 244, 0.1);
            color: #8c25f4;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in {
            animation: fadeIn 0.3s ease-out;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
    <!-- Header -->
    <header class="flex items-center justify-between p-4 bg-white/80 dark:bg-background-dark/80 backdrop-blur-md sticky top-0 z-10 border-b border-primary/10">
        <button id="backBtn" class="p-2 hover:bg-primary/10 rounded-full transition-colors text-slate-600 dark:text-slate-400 hidden">
            <span class="material-symbols-outlined">arrow_back</span>
        </button>
        <div class="flex flex-col items-center">
            <h1 class="text-lg font-bold tracking-tight text-primary">JamRoom Poll</h1>
            <div class="flex items-center gap-1.5">
                <span class="size-2 rounded-full bg-emerald-500 animate-pulse"></span>
                <p class="text-[10px] uppercase tracking-widest font-bold text-slate-500 dark:text-slate-400">Live Session</p>
            </div>
        </div>
        <button class="p-2 hover:bg-primary/10 rounded-full transition-colors text-slate-600 dark:text-slate-400">
            <span class="material-symbols-outlined">more_vert</span>
        </button>
    </header>

    <!-- Main Content -->
    <main id="mainContent" class="flex-1 flex flex-col px-6 py-8 max-w-md mx-auto w-full">
        <!-- Content will be dynamically rendered -->
    </main>

    <!-- Bottom Navigation -->
    <nav id="bottomNav" class="bg-white dark:bg-background-dark border-t border-primary/10 pb-6 pt-3 px-6 flex justify-around items-center hidden">
        <a href="#" class="nav-item active flex flex-col items-center gap-1 text-primary" data-view="vote">
            <span class="material-symbols-outlined">how_to_vote</span>
            <span class="text-[10px] font-bold uppercase tracking-wider">Vote</span>
        </a>
        <a href="#" class="nav-item flex flex-col items-center gap-1 text-slate-400 hover:text-primary transition-colors" data-view="results">
            <span class="material-symbols-outlined">analytics</span>
            <span class="text-[10px] font-bold uppercase tracking-wider">Results</span>
        </a>
        <a href="#" class="nav-item flex flex-col items-center gap-1 text-slate-400 hover:text-primary transition-colors" data-view="peers">
            <span class="material-symbols-outlined">group</span>
            <span class="text-[10px] font-bold uppercase tracking-wider">Peers</span>
        </a>
        <a href="#" class="nav-item flex flex-col items-center gap-1 text-slate-400 hover:text-primary transition-colors" data-view="config">
            <span class="material-symbols-outlined">settings</span>
            <span class="text-[10px] font-bold uppercase tracking-wider">Config</span>
        </a>
    </nav>

    <script src="/socket.io/socket.io.js"></script>
    <script src="app.js"></script>
</body>
</html>
